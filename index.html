<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="RailSmart — Enhanced Train Tracker. Search trains, track live running status, view on map, monitor delays, and check PNR status for Indian Railways.">
  <meta name="theme-color" content="#0a0e1a">
  <title>RailSmart — Enhanced Train Tracker</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Leaflet.js CDN -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- App CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">

  <!-- Map-specific inline styles for train icon -->
  <style>
    .train-marker-container {
      background: none !important;
      border: none !important;
    }
    .map-train-icon {
      position: relative;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .map-train-svg {
      font-size: 24px;
      z-index: 2;
      position: relative;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }
    .map-train-pulse {
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.3);
      animation: pulseRing 2s ease-out infinite;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Leaflet popup override for dark theme */
    .leaflet-popup-content-wrapper {
      background: #1a2235 !important;
      color: #f1f5f9 !important;
      border-radius: 10px !important;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
    }
    .leaflet-popup-tip {
      background: #1a2235 !important;
    }
    .leaflet-popup-close-button {
      color: #94a3b8 !important;
    }
    .leaflet-popup-close-button:hover {
      color: #f1f5f9 !important;
    }
    .leaflet-control-zoom a {
      background: #1a2235 !important;
      color: #f1f5f9 !important;
      border-color: rgba(255,255,255,0.1) !important;
    }
    .leaflet-control-zoom a:hover {
      background: #2a3555 !important;
    }
    .leaflet-control-attribution {
      background: rgba(10, 14, 26, 0.8) !important;
      color: #64748b !important;
      font-size: 10px !important;
    }
    .leaflet-control-attribution a {
      color: #60a5fa !important;
    }
  </style>
</head>
<body>
  <!-- ═══ Navigation Bar ═══ -->
  <nav class="nav" id="main-nav">
    <a href="#search" class="nav-brand">
      <div class="nav-brand-icon">🚆</div>
      <span class="nav-brand-text">RailSmart</span>
    </a>
    <div class="nav-tabs">
      <a href="#search" class="nav-tab active" data-page="search" id="nav-search">
        <span class="nav-tab-icon">🔍</span>
        <span>Search</span>
      </a>
      <a href="#status" class="nav-tab" data-page="status" id="nav-status">
        <span class="nav-tab-icon">📍</span>
        <span>Live Status</span>
      </a>
      <a href="#map" class="nav-tab" data-page="map" id="nav-map">
        <span class="nav-tab-icon">🗺️</span>
        <span>MAP-TRACK</span>
      </a>

      <a href="#analytics" class="nav-tab" data-page="analytics" id="nav-analytics">
        <span class="nav-tab-icon">📊</span>
        <span>Analytics</span>
      </a>

    </div>
  </nav>

  <!-- ═══ App Container ═══ -->
  <main id="app">
    <!-- Pages rendered dynamically here -->
  </main>

  <!-- ═══ Scripts (Order matters — data → utils → pages → app) ═══ -->
  <!-- Data Layer -->
  <script src="js/data/stations.js"></script>
  <script src="js/data/trackWaypoints.js"></script>
  <script src="js/data/trains.js"></script>
  <script src="js/data/delays.js"></script>


  <!-- Utilities -->
  <script src="js/utils/dom.js"></script>
  <script src="js/utils/time.js"></script>
  <script src="js/utils/storage.js"></script>

  <!-- Page Modules -->
  <script src="js/pages/search.js"></script>
  <script src="js/pages/status.js"></script>
  <script src="js/pages/map.js"></script>

  <script src="js/pages/analytics.js"></script>


  <!-- App Controller -->
  <script src="js/app.js"></script>
</body>
</html>
